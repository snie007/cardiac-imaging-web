<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>TorchCor Triangular Shell Viewer</title>
<style>body{margin:0;background:#0b1020;color:#e5e7eb;font-family:Arial}#app{display:grid;grid-template-columns:320px 1fr;height:100vh}#panel{padding:12px;background:#111827}#plot{width:100%;height:100%;display:block}.row{margin:8px 0}.small{font-size:12px;color:#9fb0cf}label{font-size:12px}input[type=range],select{width:100%}</style>
</head><body><div id='app'><div id='panel'>
<h3>Triangular shell Vm</h3>
<div class='row'><label>LOD mode</label><select id='lodMode'><option value='auto'>Auto (distance-based)</option><option value='low'>Lock Low (~50k)</option><option value='med'>Lock Medium (~100k)</option><option value='high'>Lock High (~200k)</option></select></div>
<div class='row'><label>Surface shading</label><select id='surface'><option value='smooth'>Smooth (recommended)</option><option value='faceted'>Faceted</option></select></div>
<div id='meta' class='small'>Loading…</div>
<div class='row'><button id='play'>Play</button><button id='pause'>Pause</button></div>
<div class='row'><label>Frame <span id='fval'></span></label><input id='frame' type='range' min='0' max='0' value='0'></div>
<div class='row'><label>Speed <span id='sval'>2</span></label><input id='speed' type='range' min='1' max='20' value='2'></div>
<div class='row'><label>Vm min <span id='vminv'></span></label><input id='vmin' type='range' min='-100' max='40' step='0.1' value='-80'></div>
<div class='row'><label>Vm max <span id='vmaxv'></span></label><input id='vmax' type='range' min='-100' max='40' step='0.1' value='20'></div>
<div class='row'><label><input id='wire' type='checkbox'> Wireframe</label></div>
<div class='small'>Default is High mesh to prevent visible gaps at whole-atria distance.</div>
</div><div><canvas id='plot'></canvas></div></div>
<script type='module'>
import * as THREE from './lib/three.module.js';
import { OrbitControls } from './lib/OrbitControls.js';

const q=new URLSearchParams(location.search);
const initialMode=q.get('lod')||'high';
const ui={
  lodMode:document.getElementById('lodMode'),surface:document.getElementById('surface'),meta:document.getElementById('meta'),
  frame:document.getElementById('frame'),fval:document.getElementById('fval'),speed:document.getElementById('speed'),sval:document.getElementById('sval'),
  vmin:document.getElementById('vmin'),vmax:document.getElementById('vmax'),vminv:document.getElementById('vminv'),vmaxv:document.getElementById('vmaxv'),
  wire:document.getElementById('wire')
};
ui.lodMode.value=initialMode;

const presets=['low','med','high'];
const loaded=Object.fromEntries(await Promise.all(presets.map(async p=>[p,await fetch(`./data/atrium_mesh_${p}.json`).then(r=>r.json())])));

function toGeom(data){
  const verts=new Float32Array(data.vertices.flat());
  const idx=new Uint32Array(data.faces.flat());
  const frames=data.frames.map(f=>new Float32Array(f));
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(verts,3));
  g.setIndex(new THREE.BufferAttribute(idx,1));
  const colors=new Float32Array((verts.length/3)*3);
  g.setAttribute('color',new THREE.BufferAttribute(colors,3));
  if(data.vertex_normals){g.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(data.vertex_normals.flat()),3));} else {g.computeVertexNormals();}
  g.computeBoundingBox();
  const center=new THREE.Vector3();g.boundingBox.getCenter(center);
  const size=new THREE.Vector3();g.boundingBox.getSize(size);
  const rad=Math.max(size.x,size.y,size.z)*0.65||1;
  return {data,geom:g,frames,colors,center,rad};
}
const meshes=Object.fromEntries(presets.map(p=>[p,toGeom(loaded[p])]));

const c=document.getElementById('plot');
const r=new THREE.WebGLRenderer({canvas:c,antialias:true,logarithmicDepthBuffer:true});r.setPixelRatio(devicePixelRatio);
const s=new THREE.Scene();s.background=new THREE.Color(0x0b1020);
const cam=new THREE.PerspectiveCamera(55,1,1,1000000);
const ctl=new OrbitControls(cam,r.domElement);ctl.enableDamping=true;

const matSmooth=new THREE.MeshStandardMaterial({vertexColors:true,side:THREE.DoubleSide,roughness:0.88,metalness:0.0});
const matFaceted=new THREE.MeshStandardMaterial({vertexColors:true,side:THREE.DoubleSide,roughness:0.92,metalness:0.0,flatShading:true});
const mesh=new THREE.Mesh(meshes.med.geom,matSmooth);s.add(mesh);

const amb=new THREE.HemisphereLight(0xcfe2ff,0x141a2a,0.75);s.add(amb);
const key=new THREE.DirectionalLight(0xffffff,0.65);s.add(key);
const fill=new THREE.DirectionalLight(0xaec4ff,0.25);fill.position.set(-1.2,-0.8,-0.5);s.add(fill);

let active='med';
let worldCenter=meshes.med.center.clone();
let worldRadius=meshes.med.rad;
let fr=0;

function updateClipPlanes(){
  cam.near = Math.max(1.0, worldRadius * 0.0025);
  cam.far = Math.max(cam.near * 10.0, worldRadius * 25.0);
  cam.updateProjectionMatrix();
}

function setMeta(){
  const d=meshes[active].data.meta;
  const q=d.mesh_quality||{};
  const reg=q.regularity_after_smoothing;
  ui.meta.textContent=`LOD=${active} | ${d.nodes_used}/${d.nodes_total} nodes, ${d.faces_used}/${d.faces_total} faces${reg?` | regularity mean=${reg.mean.toFixed(4)} q10=${reg.q10.toFixed(4)}`:''}`;
}

function cmap(t){t=Math.max(0,Math.min(1,t));const r=Math.min(1,1.5*t),gg=Math.sin(Math.PI*t),b=Math.min(1,1.5*(1-t));return[r,gg,b]}
function colorize(fi){
  const vmin=+ui.vmin.value,vmax=+ui.vmax.value;
  const pack=meshes[active];
  const a=pack.frames[Math.min(fi,pack.frames.length-1)];
  for(let i=0;i<a.length;i++){const t=(a[i]-vmin)/(vmax-vmin||1);const [rr,gg,bb]=cmap(t);const k=i*3;pack.colors[k]=rr;pack.colors[k+1]=gg;pack.colors[k+2]=bb;}
  pack.geom.attributes.color.needsUpdate=true;
  ui.fval.textContent=`${fi}/${pack.data.meta.frames-1}`;ui.vminv.textContent=vmin.toFixed(1);ui.vmaxv.textContent=vmax.toFixed(1)
}
function applyMaterial(){const m=ui.surface.value==='faceted'?matFaceted:matSmooth;m.wireframe=ui.wire.checked;mesh.material=m;}
function switchLOD(next){
  if(next===active) return;
  active=next;
  const p=meshes[active];
  mesh.geometry=p.geom;
  worldCenter=p.center;worldRadius=p.rad;
  updateClipPlanes();
  ui.frame.max=p.data.meta.frames-1;
  colorize(Math.min(fr,p.data.meta.frames-1));
  setMeta();
}
function autoLodChoice(){
  const dist=cam.position.distanceTo(worldCenter);
  // avoid dropping to low preset, which can appear gappy at whole-atria distance
  if(dist>worldRadius*4.8) return 'med';
  return 'high';
}

const mid=meshes.med;ctl.target.copy(mid.center);cam.position.set(mid.center.x,mid.center.y,mid.center.z+mid.rad*2.6);worldCenter=mid.center.clone();worldRadius=mid.rad;updateClipPlanes();ctl.update();
ui.frame.max=mid.data.meta.frames-1;ui.vmin.value=mid.data.meta.vm_min.toFixed(1);ui.vmax.value=mid.data.meta.vm_max.toFixed(1);
ui.speed.oninput=()=>ui.sval.textContent=ui.speed.value;
ui.frame.oninput=()=>{fr=+ui.frame.value;colorize(fr)};
ui.vmin.oninput=()=>colorize(fr);ui.vmax.oninput=()=>colorize(fr);
ui.wire.onchange=applyMaterial;ui.surface.onchange=applyMaterial;
ui.lodMode.onchange=()=>{const u=new URLSearchParams(location.search);u.set('lod',ui.lodMode.value);history.replaceState(null,'',`?${u.toString()}`);if(ui.lodMode.value!=='auto') switchLOD(ui.lodMode.value)};
applyMaterial();
if(ui.lodMode.value!=='auto') switchLOD(ui.lodMode.value);
setMeta();

function resize(){const w=c.clientWidth,h=c.clientHeight;r.setSize(w,h,false);cam.aspect=w/h;cam.updateProjectionMatrix()}window.onresize=resize;resize();
let playing=true,last=performance.now(),acc=0;colorize(0);
document.getElementById('play').onclick=()=>playing=true;document.getElementById('pause').onclick=()=>playing=false;
(function loop(now){requestAnimationFrame(loop);const dt=(now-last)/1000;last=now;ctl.update();
  const toCam=new THREE.Vector3().subVectors(cam.position,ctl.target).normalize();
  key.position.copy(cam.position).addScaledVector(toCam,worldRadius*0.35); // camera-linked key light
  key.target.position.copy(ctl.target);key.target.updateMatrixWorld();
  if(ui.lodMode.value==='auto') switchLOD(autoLodChoice());
  if(playing){acc+=dt;const step=1/(+ui.speed.value);while(acc>=step){acc-=step;const maxF=meshes[active].data.meta.frames;fr=(fr+1)%maxF;ui.frame.value=fr;colorize(fr)}}
  r.render(s,cam)
})(performance.now());
</script></body></html>
