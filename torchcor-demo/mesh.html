<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>TorchCor Triangular Shell Viewer</title>
<style>body{margin:0;background:#0b1020;color:#e5e7eb;font-family:Arial}#app{display:grid;grid-template-columns:320px 1fr;height:100vh}#panel{padding:12px;background:#111827}#plot{width:100%;height:100%;display:block}.row{margin:8px 0}.small{font-size:12px;color:#9fb0cf}label{font-size:12px}input[type=range],select{width:100%}</style>
</head><body><div id='app'><div id='panel'>
<h3>Triangular shell Vm</h3><div class='row'><label>Connected remesh preset</label><select id='preset'><option value='low'>Low (~50k faces)</option><option value='med'>Medium (~100k faces)</option><option value='high'>High (~200k faces)</option></select></div>
<div id='meta' class='small'>Loading…</div>
<div class='row'><button id='play'>Play</button><button id='pause'>Pause</button></div>
<div class='row'><label>Frame <span id='fval'></span></label><input id='frame' type='range' min='0' max='0' value='0'></div>
<div class='row'><label>Speed <span id='sval'>2</span></label><input id='speed' type='range' min='1' max='20' value='2'></div>
<div class='row'><label>Vm min <span id='vminv'></span></label><input id='vmin' type='range' min='-100' max='40' step='0.1' value='-80'></div>
<div class='row'><label>Vm max <span id='vmaxv'></span></label><input id='vmax' type='range' min='-100' max='40' step='0.1' value='20'></div>
<div class='row'><label>Render mode</label><select id='renderMode'><option value='smooth'>Shaded smooth (default)</option><option value='flat'>Shaded flat</option><option value='unlit'>Unlit (no lighting)</option></select></div>
<div class='row'><label><input id='wire' type='checkbox'> Wireframe</label></div>
<div class='row'><label><input id='showNormals' type='checkbox'> Show face normals (debug)</label></div>
<div class='small'>Viewer uses repaired meshes exported by <code>export_mesh_for_web.py</code>.</div>
</div><div><canvas id='plot'></canvas></div></div>
<script type='module'>
import * as THREE from './lib/three.module.js';
import { OrbitControls } from './lib/OrbitControls.js';
const q=new URLSearchParams(location.search);const p0=q.get('mesh')||'med';
const preset=document.getElementById('preset');preset.value=p0;preset.onchange=()=>{const u=new URLSearchParams(location.search);u.set('mesh',preset.value);location.search=u.toString()};
const data=await fetch(`./data/atrium_mesh_${preset.value}.json`).then(r=>r.json());
const meta=data.meta;const remeshMethod=meta.remesh?.method||'unknown';const quality=meta.mesh_quality?.after;
document.getElementById('meta').textContent=`${meta.nodes_used}/${meta.nodes_total} nodes, ${meta.faces_used}/${meta.faces_total} faces, ${meta.frames} frames, ${remeshMethod}${quality?`, QA pass=${quality.pass}`:''}`;
const c=document.getElementById('plot');const r=new THREE.WebGLRenderer({canvas:c,antialias:true});r.setPixelRatio(devicePixelRatio);
const s=new THREE.Scene();s.background=new THREE.Color(0x0b1020);const cam=new THREE.PerspectiveCamera(55,1,0.1,1e9);const ctl=new OrbitControls(cam,r.domElement);ctl.enableDamping=true;
const verts=new Float32Array(data.vertices.flat());const idx=new Uint32Array(data.faces.flat());const frames=data.frames.map(f=>new Float32Array(f));
const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(verts,3));g.setIndex(new THREE.BufferAttribute(idx,1));
const colors=new Float32Array((verts.length/3)*3);g.setAttribute('color',new THREE.BufferAttribute(colors,3));
if(data.vertex_normals){g.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(data.vertex_normals.flat()),3));} else {g.computeVertexNormals();}
const matUnlit = new THREE.MeshBasicMaterial({vertexColors:true,side:THREE.DoubleSide});
const matSmooth = new THREE.MeshStandardMaterial({vertexColors:true,side:THREE.DoubleSide,roughness:0.65,metalness:0.05});
const matFlat = new THREE.MeshStandardMaterial({vertexColors:true,side:THREE.DoubleSide,roughness:0.65,metalness:0.05,flatShading:true});
let m = matSmooth;
const mesh=new THREE.Mesh(g,m);s.add(mesh);
const amb=new THREE.AmbientLight(0xffffff,0.42);s.add(amb);
const key=new THREE.DirectionalLight(0xffffff,0.9);key.position.set(1.2,0.8,1.5);s.add(key);
const fill=new THREE.DirectionalLight(0x88aaff,0.35);fill.position.set(-1.0,-0.6,-0.8);s.add(fill);

function buildFaceNormalLines(step=128, scale=0.8){
  const pos=g.getAttribute('position');const id=g.getIndex();
  const nFaces=Math.floor(id.count/3);const stride=Math.max(1,Math.floor(nFaces/step));
  const points=[];
  for(let fi=0;fi<nFaces;fi+=stride){
    const i0=id.getX(fi*3),i1=id.getX(fi*3+1),i2=id.getX(fi*3+2);
    const a=new THREE.Vector3(pos.getX(i0),pos.getY(i0),pos.getZ(i0));
    const b=new THREE.Vector3(pos.getX(i1),pos.getY(i1),pos.getZ(i1));
    const c=new THREE.Vector3(pos.getX(i2),pos.getY(i2),pos.getZ(i2));
    const ctr=new THREE.Vector3().add(a).add(b).add(c).multiplyScalar(1/3);
    const n=new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(b,a),new THREE.Vector3().subVectors(c,a));
    if(n.lengthSq()<1e-14) continue;
    n.normalize().multiplyScalar(scale);
    points.push(ctr, new THREE.Vector3().addVectors(ctr,n));
  }
  const lg=new THREE.BufferGeometry().setFromPoints(points);
  return new THREE.LineSegments(lg,new THREE.LineBasicMaterial({color:0xffdd55,transparent:true,opacity:0.85}));
}
let normalLines=buildFaceNormalLines(); normalLines.visible=false; s.add(normalLines);

g.computeBoundingBox();const bb=g.boundingBox;const center=new THREE.Vector3();bb.getCenter(center);const sz=new THREE.Vector3();bb.getSize(sz);const rad=Math.max(sz.x,sz.y,sz.z)*0.65||1;ctl.target.copy(center);cam.position.set(center.x,center.y,center.z+rad*2.6);ctl.update();
function cmap(t){t=Math.max(0,Math.min(1,t));const r=Math.min(1,1.5*t),gg=Math.sin(Math.PI*t),b=Math.min(1,1.5*(1-t));return[r,gg,b]}
const ui={frame:document.getElementById('frame'),fval:document.getElementById('fval'),speed:document.getElementById('speed'),sval:document.getElementById('sval'),vmin:document.getElementById('vmin'),vmax:document.getElementById('vmax'),vminv:document.getElementById('vminv'),vmaxv:document.getElementById('vmaxv'),wire:document.getElementById('wire'),renderMode:document.getElementById('renderMode'),showNormals:document.getElementById('showNormals')};
ui.frame.max=meta.frames-1;ui.vmin.value=meta.vm_min.toFixed(1);ui.vmax.value=meta.vm_max.toFixed(1);ui.speed.oninput=()=>ui.sval.textContent=ui.speed.value;
function applyMaterial(){
  const mode=ui.renderMode.value;
  m = mode==='smooth' ? matSmooth : (mode==='flat' ? matFlat : matUnlit);
  m.wireframe = ui.wire.checked;
  mesh.material = m;
}
ui.wire.onchange=applyMaterial;
ui.renderMode.onchange=applyMaterial;
ui.showNormals.onchange=()=>normalLines.visible=ui.showNormals.checked;
applyMaterial();
function colorize(fi){const vmin=+ui.vmin.value,vmax=+ui.vmax.value,a=frames[fi];for(let i=0;i<a.length;i++){const t=(a[i]-vmin)/(vmax-vmin||1);const [rr,gg,bb]=cmap(t);const k=i*3;colors[k]=rr;colors[k+1]=gg;colors[k+2]=bb;}g.attributes.color.needsUpdate=true;ui.fval.textContent=`${fi}/${meta.frames-1}`;ui.vminv.textContent=vmin.toFixed(1);ui.vmaxv.textContent=vmax.toFixed(1)}
ui.frame.oninput=()=>colorize(+ui.frame.value);ui.vmin.oninput=()=>colorize(+ui.frame.value);ui.vmax.oninput=()=>colorize(+ui.frame.value);
function resize(){const w=c.clientWidth,h=c.clientHeight;r.setSize(w,h,false);cam.aspect=w/h;cam.updateProjectionMatrix()}window.onresize=resize;resize();
let playing=true,last=performance.now(),acc=0,fr=0;colorize(0);document.getElementById('play').onclick=()=>playing=true;document.getElementById('pause').onclick=()=>playing=false;
(function loop(now){requestAnimationFrame(loop);const dt=(now-last)/1000;last=now;ctl.update();if(playing){acc+=dt;const step=1/(+ui.speed.value);while(acc>=step){acc-=step;fr=(fr+1)%meta.frames;ui.frame.value=fr;colorize(fr)}}r.render(s,cam)})(performance.now());
</script></body></html>
